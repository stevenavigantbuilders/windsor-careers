<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Windsor Careers Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Darker+Grotesque:wght@400;500;600;700;800;900&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #010101; --white: #FFFFFF; --cement: #B0ADA8;
    --dark: #242834; --prussian: #003152; --light: #F5F5F3;
    --success: #2E7D32; --error: #C62828; --warning: #F57F17;
    --font-display: 'Darker Grotesque', sans-serif;
    --font-body: 'Montserrat', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font-body); background: var(--light); color: var(--black); }

  /* Auth screen */
  .auth-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 24px;
  }
  .auth-screen h1 {
    font-family: var(--font-display); font-size: 2rem; font-weight: 800;
    letter-spacing: 0.1em;
  }
  .auth-input {
    font-family: var(--font-body); font-size: 0.85rem;
    padding: 12px 20px; border: 1px solid var(--cement);
    width: 300px; text-align: center;
  }
  .auth-btn {
    font-family: var(--font-body); font-size: 0.7rem;
    padding: 10px 32px; background: var(--black); color: var(--white);
    border: none; cursor: pointer; letter-spacing: 0.12em;
    text-transform: uppercase; font-weight: 600;
  }

  /* Dashboard */
  .dashboard { display: none; }
  .topbar {
    background: var(--dark); color: var(--white);
    padding: 16px 32px; display: flex; justify-content: space-between; align-items: center;
  }
  .topbar-title {
    font-family: var(--font-display); font-size: 1.2rem; font-weight: 700;
    letter-spacing: 0.15em; text-transform: uppercase;
  }
  .topbar-actions { display: flex; gap: 12px; }
  .topbar-btn {
    font-family: var(--font-body); font-size: 0.6rem;
    padding: 6px 16px; border: 1px solid rgba(255,255,255,0.3);
    background: none; color: var(--white); cursor: pointer;
    letter-spacing: 0.1em; text-transform: uppercase;
    transition: all 0.3s;
  }
  .topbar-btn:hover { background: var(--prussian); border-color: var(--prussian); }

  /* Stats cards */
  .stats-row {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 16px; padding: 24px 32px;
  }
  .stat-card {
    background: var(--white); padding: 24px;
    border: 1px solid rgba(176,173,168,0.2);
  }
  .stat-card-num {
    font-family: var(--font-display); font-size: 2.5rem;
    font-weight: 900; color: var(--black); line-height: 1;
  }
  .stat-card-label {
    font-size: 0.6rem; color: var(--cement); text-transform: uppercase;
    letter-spacing: 0.15em; margin-top: 4px;
  }

  /* Table */
  .table-container { padding: 0 32px 32px; }
  .table-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px;
  }
  .table-title {
    font-family: var(--font-display); font-size: 1.4rem; font-weight: 700;
  }
  .table-filter {
    font-family: var(--font-body); font-size: 0.78rem;
    padding: 6px 16px; border: 1px solid var(--cement);
    background: var(--white);
  }
  table {
    width: 100%; border-collapse: collapse;
    background: var(--white); border: 1px solid rgba(176,173,168,0.2);
  }
  th {
    font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase;
    font-weight: 600; color: var(--cement); text-align: left;
    padding: 12px 16px; border-bottom: 2px solid rgba(176,173,168,0.2);
    background: var(--white);
  }
  td {
    font-size: 0.8rem; padding: 12px 16px;
    border-bottom: 1px solid rgba(176,173,168,0.1);
    vertical-align: top;
  }
  tr:hover td { background: var(--light); }
  .status-badge {
    display: inline-block; padding: 3px 10px; font-size: 0.58rem;
    letter-spacing: 0.1em; text-transform: uppercase; font-weight: 600;
    border: 1px solid;
  }
  .status-new { color: var(--prussian); border-color: var(--prussian); }
  .status-reviewed { color: var(--warning); border-color: var(--warning); }
  .status-interview { color: var(--success); border-color: var(--success); }
  .status-offered { color: #7B1FA2; border-color: #7B1FA2; }
  .status-hired { color: var(--success); border-color: var(--success); background: #E8F5E9; }
  .status-rejected { color: var(--error); border-color: var(--error); }

  .action-select {
    font-family: var(--font-body); font-size: 0.7rem;
    padding: 4px 8px; border: 1px solid var(--cement);
  }
  .expand-btn {
    background: none; border: none; cursor: pointer;
    font-size: 1rem; color: var(--cement); padding: 0 8px;
  }
  .detail-row { display: none; }
  .detail-row.open { display: table-row; }
  .detail-row td {
    background: var(--light); font-size: 0.78rem;
    line-height: 1.7; color: #555; padding: 16px 24px;
  }
  .detail-row td strong { color: var(--black); }

  .empty-state {
    text-align: center; padding: 60px; color: var(--cement);
    font-size: 0.88rem;
  }

  @media (max-width: 768px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .table-container { overflow-x: auto; }
  }
</style>
</head>
<body>

<!-- Auth -->
<div class="auth-screen" id="authScreen">
  <h1>WINDSOR ADMIN</h1>
  <p style="font-size:0.78rem; color:var(--cement);">Enter admin key to access the dashboard</p>
  <input class="auth-input" type="password" id="keyInput" placeholder="Admin Key" onkeydown="if(event.key==='Enter') login()">
  <button class="auth-btn" onclick="login()">Access Dashboard</button>
</div>

<!-- Dashboard -->
<div class="dashboard" id="dashboard">
  <div class="topbar">
    <div class="topbar-title">Windsor Careers &mdash; Admin</div>
    <div class="topbar-actions">
      <button class="topbar-btn" onclick="loadData()">Refresh</button>
      <button class="topbar-btn" onclick="exportCSV()">Export CSV</button>
      <button class="topbar-btn" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="stats-row" id="statsRow">
    <div class="stat-card"><div class="stat-card-num" id="sTotalApps">-</div><div class="stat-card-label">Total Applications</div></div>
    <div class="stat-card"><div class="stat-card-num" id="sTodayApps">-</div><div class="stat-card-label">Today</div></div>
    <div class="stat-card"><div class="stat-card-num" id="sTotalInterest">-</div><div class="stat-card-label">Interest Registered</div></div>
    <div class="stat-card"><div class="stat-card-num" id="sNewApps">-</div><div class="stat-card-label">Unreviewed</div></div>
  </div>

  <div class="table-container">
    <div class="table-header">
      <div class="table-title">Applications</div>
      <select class="table-filter" id="statusFilter" onchange="loadData()">
        <option value="">All Statuses</option>
        <option value="new">New</option>
        <option value="reviewed">Reviewed</option>
        <option value="interview">Interview</option>
        <option value="offered">Offered</option>
        <option value="hired">Hired</option>
        <option value="rejected">Rejected</option>
      </select>
    </div>
    <table>
      <thead>
        <tr>
          <th></th>
          <th>Name</th>
          <th>Position</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Status</th>
          <th>Date</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="appTableBody">
        <tr><td colspan="8" class="empty-state">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
let ADMIN_KEY = '';
let allApps = [];

function login() {
  ADMIN_KEY = document.getElementById('keyInput').value;
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  loadData();
}

function logout() {
  ADMIN_KEY = '';
  document.getElementById('authScreen').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('keyInput').value = '';
}

async function loadData() {
  try {
    // Stats
    const statsRes = await fetch('/api/admin/stats', { headers: { 'x-admin-key': ADMIN_KEY } });
    if (statsRes.status === 401) { alert('Invalid admin key'); logout(); return; }
    const stats = await statsRes.json();
    document.getElementById('sTotalApps').textContent = stats.totalApps;
    document.getElementById('sTodayApps').textContent = stats.todayApps;
    document.getElementById('sTotalInterest').textContent = stats.totalInterest;
    const newCount = (stats.byStatus.find(s => s.status === 'new') || {}).count || 0;
    document.getElementById('sNewApps').textContent = newCount;

    // Applications
    const appsRes = await fetch('/api/admin/applications', { headers: { 'x-admin-key': ADMIN_KEY } });
    const appsData = await appsRes.json();
    allApps = appsData.applications;
    renderTable();
  } catch (err) {
    console.error(err);
    alert('Failed to load data.');
  }
}

function renderTable() {
  const filter = document.getElementById('statusFilter').value;
  const filtered = filter ? allApps.filter(a => a.status === filter) : allApps;
  const tbody = document.getElementById('appTableBody');

  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" class="empty-state">No applications found.</td></tr>';
    return;
  }

  tbody.innerHTML = filtered.map((app, i) => `
    <tr>
      <td><button class="expand-btn" onclick="toggleDetail(${i})">&#9662;</button></td>
      <td><strong>${app.first_name} ${app.last_name}</strong></td>
      <td>${app.position}</td>
      <td>${app.email}</td>
      <td>${app.phone}</td>
      <td><span class="status-badge status-${app.status}">${app.status}</span></td>
      <td style="white-space:nowrap;">${new Date(app.created_at).toLocaleDateString()}</td>
      <td>
        <select class="action-select" onchange="updateStatus(${app.id}, this.value)">
          <option value="">Change...</option>
          <option value="reviewed">Reviewed</option>
          <option value="interview">Interview</option>
          <option value="offered">Offered</option>
          <option value="hired">Hired</option>
          <option value="rejected">Rejected</option>
        </select>
      </td>
    </tr>
    <tr class="detail-row" id="detail-${i}">
      <td colspan="8">
        <strong>Education:</strong> ${app.education || 'N/A'} — ${app.field_of_study || ''} at ${app.institution || 'N/A'}<br>
        <strong>Experience:</strong> ${app.experience || 'N/A'}<br>
        <strong>Skills:</strong> ${app.skills || 'N/A'}<br>
        <strong>Cover Note:</strong> ${app.cover_note || 'N/A'}<br>
        <strong>Resume:</strong> ${app.resume_link ? '<a href="'+app.resume_link+'" target="_blank">View</a>' : 'Not provided'}<br>
        <strong>Source:</strong> ${app.source} &middot; <strong>Applied:</strong> ${app.created_at}
      </td>
    </tr>
  `).join('');
}

function toggleDetail(i) {
  document.getElementById(`detail-${i}`).classList.toggle('open');
}

async function updateStatus(id, status) {
  if (!status) return;
  try {
    await fetch(`/api/admin/applications/${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'x-admin-key': ADMIN_KEY },
      body: JSON.stringify({ status })
    });
    loadData();
  } catch (err) { alert('Failed to update.'); }
}

function exportCSV() {
  window.open('/api/admin/export?key=' + ADMIN_KEY);
  // Also works via header - for direct browser download, use this workaround:
  fetch('/api/admin/export', { headers: { 'x-admin-key': ADMIN_KEY } })
    .then(r => r.blob())
    .then(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'windsor_applications.csv'; a.click();
      URL.revokeObjectURL(url);
    });
}
</script>
</body>
</html>
